    </header>
    <div class="wrapper">
        <span class="icon-close"><ion-icon name="close"></ion-icon>
        </span>

        <div class=" form-box login">
            <h2>Login</h2>
            <form action ="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="Email"required>
                    <label> Email </label>
                    </div>
                    <div class="input-box">
                        <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                        <input type="Password"required>
                        <label> Password </label>
                        </div>

                        <div class="remember-forgot">
                            <label><input type="checkbox">
                                Remember me</label>
                            <a href ="#">Forget Password?</a>
                            </div>
                <button type="submit" class="btn">Login</button>
                <div class ="login-register">
                    <p> Don't have an account?<a href ="#" class="register-link">Register</a>
                    </p>
                </div> 
            </form>
        </div>
        <div class=" form-box register">
            <h2>Registration</h2>
            <form action ="#">
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="person"></ion-icon>
                    </span>
                    <input type="text" required>
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="mail"></ion-icon>
                    </span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox">
                       I agree to the terms & conditions</label>
                        
                </div>
                <button type="submit" class="btn">Register</button>
                <div class ="login-register">
                   <p> Already have an account?<a href ="#" class="login-link">Login</a></p>

                </div> 
           </form>
        </div>
    </div>

    <script>const wrapper = document.querySelector('.wrapper');
        const loginLink = document.querySelector('.login-link');
        const registerLink = document.querySelector('.register-link');
        const btnPopup = document.querySelector('.btnLogin-popup');
        const iconClose = document.querySelector('.icon-close');
        const loginForm = document.querySelector('.form-box.login form');
        
        registerLink.addEventListener('click', ()=> {
            wrapper.classList.add('active');
        
        })
        loginLink.addEventListener('click', ()=> {
            wrapper.classList.remove('active');
        });
        btnPopup.addEventListener('click', ()=> {
            wrapper.classList.add('active-popup');
        
        });
        iconClose.addEventListener('click', ()=> {
            wrapper.classList .remove('active-popup');
        
        });
        loginForm.addEventListener('submit', (e)=> {
            e.preventDefault();
            
            wrapper.classList.remove('active-popup');
        });
        document.addEventListener("DOMContentLoaded", function () {
            const loginForm = document.querySelector(".form-box.login form"); // Target the login form
            const wrapper = document.querySelector(".wrapper");
        
            loginForm.addEventListener("submit", function (event) {
                event.preventDefault(); // Prevent default form submission
        
                // Get email and password values
                const email = loginForm.querySelector('input[type="email"]').value.trim();
                const password = loginForm.querySelector('input[type="password"]').value.trim();
        
                // Check if email and password are correct
                if (email === "aarya@gmail.com" && password === "123456") {
                    window.location.href = "/loginsuccessful"; // Redirect to successful login page
                } else {
                    alert("Invalid email or password"); // Show error message
                }
            });
        });
        
        
            </script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
